<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto Migrado para React</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050505;
      color: #ffffff;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .card {
      width: min(100%, 640px);
      background: linear-gradient(180deg, rgba(24, 24, 24, 0.96), rgba(11, 11, 11, 0.96));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.42);
    }

    img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.16);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.6;
      color: #d0d0d0;
    }

    code {
      display: inline-block;
      background: #111111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 10px 12px;
      margin: 6px 0;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="logo.png" alt="Logo da Foguinho Barber">
    <h1>Este arquivo nao e mais a versao principal</h1>
    <p>O projeto foi migrado para React.</p>
    <p>As mudancas visuais agora estao em <code>src/App.jsx</code> e <code>src/styles.css</code>.</p>
    <p>Para ver a nova versao, rode:</p>
    <p><code>npm install</code></p>
    <p><code>npm run dev</code></p>
    <p>Depois abra o endereco mostrado no terminal, normalmente <code>http://localhost:5173</code>.</p>
  </main>
</body>
</html>
